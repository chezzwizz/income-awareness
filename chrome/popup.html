<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<title>Income Awareness</title>
	<link rel="stylesheet" href="popup.css" />
</head>
<body>
	<div id="app">
		<h1>Income Awareness</h1>
		<form id="income-form">
			<label>Annual salary
				<input type="number" id="annual" placeholder="e.g. 60000" step="0.01" />
			</label>
			<label>Monthly salary
				<input type="number" id="monthly" placeholder="e.g. 5000" step="0.01" />
			</label>
			<label>Hourly rate
				<input type="number" id="hourly" placeholder="e.g. 30" step="0.01" />
			</label>
			<div class="buttons">
				<button type="submit" id="save">Save</button>
				<button type="button" id="clear">Clear</button>
			</div>
		</form>
	</div>
	<script src="popup.js"></script>
</body>
</html>
